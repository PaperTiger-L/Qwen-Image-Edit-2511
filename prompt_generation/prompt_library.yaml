prompt_template: |
  请基于原图进行真实照片级局部编辑，在带有草地或路面的真实户外场景中自然添加{target_description}，不要改变其他内容。

  新增目标应自然出现在{placement_description}。整体布局必须像原始户外场景中原本就存在的元素，不要刻意居中，不要整齐排列，不要让新增内容成为画面主体，也不要破坏原有构图节奏。

  新增目标的状态和行为应满足以下要求：{state_description}。所有新增内容都必须符合原图透视关系、尺度关系、空间层次和现场场景逻辑，像日常户外环境、宠物活动、行人活动、园艺维护、公共绿地杂物或自然环境中真实出现的样子。

  新增目标必须与草叶、碎草、泥土、地面、路面、步道边缘、围栏、灌木、花坛、空地或周边环境真实接触，并具有柔和、低对比度的接触阴影；必要时应被附近草叶、地形起伏、路边设施、现场杂物或环境元素轻微遮挡，避免悬浮感、贴纸感、生硬拼贴感或不真实边缘。外观要求如下：{appearance_description}

  新增目标必须严格匹配所在位置的景深、焦平面、清晰度和细节层次。较远处的目标应更小、更模糊、细节更少；较近处的目标可稍清晰，但不能比同距离原始环境更锐利。不要出现干净抠图边缘、异常高清纹理、错误透视、错误比例、异常轮廓或与现场不一致的局部清晰度。

  新增目标的光照方向、亮度、色温、阴影、噪声、压缩痕迹、轻微运动模糊和镜头透视必须与原图一致，整体风格必须保持为真实室外现场采集照片效果，避免卡通感、塑料感、摄影棚光感、过度锐化、过强反差或明显AI生成痕迹。

  保持原图中草地纹理、路面、背景、天空、建筑、车辆、人物、构图和所有未提及区域完全不变。不要重绘整张图，不要改变原图景深，不要额外添加未指定的其他物体，不要破坏原始户外场景的真实性。

  最终效果应像真实室外草地、绿地、公园、草场、道路边缘或开放场景中原本就存在这些目标，整体自然、低调、可信，看不出AI生成或后期合成痕迹。
negative_prompt: >-
  不要重绘整张图，不要改变原图景深，不要改变草地、路面、建筑、天空、背景、车辆和人物，不要新增未指定物体，不要悬浮，不要贴纸感，不要卡通感，不要塑料感，不要棚拍光感，不要过度锐化，不要异常高清边缘，不要错误透视，不要错误比例。
category_ratios:
  宠物与小动物: 0.42
  人物与轻度活动: 0.28
  儿童活动物品: 0.10
  园艺用品与庭院工具: 0.10
  庭院设施与居家杂物: 0.05
  自然杂物与环境干扰: 0.05
target_library:
  - category: 宠物与小动物
    target_key: small_pet_dog
    target_variants:
      - 一只小型宠物狗
      - 两只体型不大的宠物狗
      - 一只正在户外草地边活动的小狗
    placement_variants:
      - 画面中景偏左的草地或路边绿化边缘位置
      - 画面中景偏右的草地、空地或草丛边，部分身体被草叶轻微遮挡
      - 更远一点的背景草地、绿地或路边区域，靠近围栏、灌木或环境边界的位置
    state_variants:
      - 姿态自然，可以低头闻草、短暂停留或慢慢穿过草地，不要正对镜头摆拍
      - 动作应像真实户外环境中自然活动的宠物，不要夸张奔跑或跳跃到不合理位置
      - 整体不要显得像画面主体，体型要小，存在感要低调
    appearance_variants:
      - 毛色应为棕色、灰白色、黑褐色或浅黄色等常见家养犬颜色，毛发细节自然，不要过分鲜艳
      - 可以带轻微脏污、草屑或真实户外活动痕迹，不要像宠物写真
      - 清晰度必须服从原图景深，远处的狗要更小、更虚，不要比草地更锐利
  - category: 宠物与小动物
    target_key: cat
    target_variants:
      - 一只小型家猫
      - 一只在户外场景中短暂停留的猫
      - 一只体型不大的草地边流浪猫
    placement_variants:
      - 画面中景偏左的草地、步道边或空地边缘
      - 画面中景偏右的草丛边、路边绿化旁，局部身体被草叶挡住
      - 背景稍远处靠近灌木、围栏、路边设施或环境边界的位置
    state_variants:
      - 姿态自然，可以站立观察、缓慢行走或蹲在草边，不要出现夸张表情
      - 像普通户外环境里偶然出现的猫，不要有宠物摆拍感
      - 身体可以部分被草叶遮挡，避免轮廓过于完整显眼
    appearance_variants:
      - 毛色可为灰色、黑白色、棕灰色或橘灰色，颜色要自然低调
      - 不要过度干净，不要出现高亮棚拍毛发质感
      - 整体细节要与环境一致，不要出现比周围环境更高清的毛发边缘
  - category: 宠物与小动物
    target_key: squirrel
    target_variants:
      - 一只松鼠
      - 两只体型较小的松鼠
      - 一只正在草地边活动的灰棕色松鼠
    placement_variants:
      - 画面中景靠近树下阴影区域的草地表面
      - 画面中景偏左或偏右、靠近灌木边缘的位置
      - 背景稍远处靠近木栅栏、树根或落叶边缘的位置
    state_variants:
      - 可以低头觅食、短暂停留或沿草地边缘小范围移动，动作不要过大
      - 体型应偏小，不要让松鼠成为主要视觉焦点
      - 必要时可被草叶、落叶或地面起伏轻微遮挡
    appearance_variants:
      - 颜色以灰棕色、棕灰色为主，尾巴自然蓬松但不要过度夸张
      - 不要出现卡通化大眼睛或过于可爱的拟人化效果
      - 细节层次必须真实，不能像抠图贴上去
  - category: 宠物与小动物
    target_key: small_birds
    target_variants:
      - 两到三只体型很小的小鸟
      - 几只零散分布在草地上的小鸟
      - 两只正在草坪上活动的小鸟
    placement_variants:
      - 画面中景偏左和偏右的草地表面，不要集中在同一点
      - 靠近碎草区域或割草机作业路径附近的草面上
      - 其中一只可出现在更远一点的背景草地中，尺寸更小、细节更少
    state_variants:
      - 姿态自然，可以低头觅食、短暂停留或小步移动，不要像观赏鸟摆拍
      - 分布要松散自然，不要整齐排列
      - 远处个体应更模糊，不要全部同样清晰
    appearance_variants:
      - 羽毛颜色应为灰褐色、灰白色或黑褐色等低调自然色
      - 不要出现高饱和亮色羽毛或热带观赏鸟外观
      - 体型要小，和草坪尺度关系真实
  - category: 宠物与小动物
    target_key: rabbit
    target_variants:
      - 一只小型兔子
      - 一只在草地或空地中短暂停留的野兔
      - 一只体型较小的灰褐色兔子
    placement_variants:
      - 画面中景偏右的草地中，部分身体被草遮挡
      - 背景稍远处靠近围栏、灌木、树荫或场地边缘位置
      - 画面中景草地边缘，靠近花坛、绿化带或空地边界处
    state_variants:
      - 姿态应安静自然，可以停留、轻微转头或低头，不要夸张跳跃
      - 不要让兔子显得过大或像前景主体
      - 轮廓可以略微被草叶打断，避免完整剪影感
    appearance_variants:
      - 毛色应为灰白色、棕灰色或灰褐色，避免纯白高亮效果
      - 不要出现卡通化、棚拍感或异常蓬松毛发
      - 细节应服从原图焦平面和压缩痕迹
  - category: 人物与轻度活动
    target_key: child_playing
    target_variants:
      - 一个小孩
      - 一个正在户外草地附近活动的孩子
      - 一名体型较小的儿童
    placement_variants:
      - 画面中远景草地边缘、开阔绿地或公园草坪附近的位置
      - 背景草地、空地或绿化带边缘，靠近围栏、游玩区域或步道附近
      - 画面中景稍远处，靠近道路边、人行道或路面边缘的位置
    state_variants:
      - 动作自然，可以站着看向别处、弯腰捡东西或慢慢走过草地，但不要正面摆拍
      - 人物不应占据过大面积，不要成为主角
      - 如果距离较远，脸部不需要清晰，避免五官异常
    appearance_variants:
      - 穿着应像普通户外日常服装，例如 T 恤、短裤、运动鞋或休闲裤，颜色自然不过分鲜艳
      - 不要出现正式服装、戏剧化姿势或时尚大片感
      - 必须保持真实户外抓拍感，与环境景深和光线一致
  - category: 人物与轻度活动
    target_key: adult_family_member
    target_variants:
      - 一名成年家庭成员
      - 一个站在草地边或路边的成年人
      - 一位正在户外场景中短暂停留的成年人
    placement_variants:
      - 画面中远景靠近步道、围栏、开放区域或场地边缘的位置
      - 草地边缘靠近路面、人行道或小路的位置
      - 背景区域靠近灌木、花坛、公共设施或环境边缘的位置
    state_variants:
      - 可以站立观察、缓慢走动或手里拿着日常小物件，但动作不要夸张
      - 人物应融入场景，不要看向镜头摆姿势
      - 如果位置较远，可只保留大体姿态，不强调面部细节
    appearance_variants:
      - 穿着应像普通户外休闲着装，例如牛仔裤、短裤、T 恤、卫衣或运动服，避免高饱和夸张服饰
      - 不要出现职业制服、礼服或过强时尚拍摄感
      - 清晰度、阴影和透视必须完全服从原图
  - category: 人物与轻度活动
    target_key: gardener
    target_variants:
      - 一名园艺工
      - 一个正在户外场景边缘整理杂物的人
      - 一位正在草地或绿化边进行简单维护活动的成年人
    placement_variants:
      - 画面中景偏左或偏右的草地边缘，靠近灌木、绿化带或场地边界区域
      - 中远景靠近工具区、开放场地边缘或步道一侧的位置
      - 背景靠近围栏、树下阴影或路边设施附近的位置
    state_variants:
      - 可以弯腰整理草地边缘、拿着小工具短暂停留或站在一旁观察，不要有夸张动作
      - 人物应像现场自然存在的作业人员，不要成为主体
      - 必要时身体局部可被草叶、花坛边或工具遮挡
    appearance_variants:
      - 穿着应为普通户外工作服或休闲服，带轻微使用痕迹，颜色中性低调
      - 不要出现过度干净的广告宣传照质感
      - 整体应像真实户外维护或整理现场照片中的人物
  - category: 人物与轻度活动
    target_key: delivery_box_scene
    target_variants:
      - 一个刚被放在院子边的快递纸箱
      - 一个小型快递包裹
      - 一个放在草地边缘的棕色纸箱
    placement_variants:
      - 画面中景靠近人行道、道路边或草地边缘的位置
      - 靠近步道入口、路边区域或场地出入口一侧的草地边缘
      - 画面中景偏左或偏右、靠近铺装路面与草地或空地交界的位置
    state_variants:
      - 摆放状态自然，略微有使用痕迹，像刚被放下不久
      - 箱体不要正对镜头工整摆放，不要像商品展示
      - 底部必须与地面真实接触，必要时可有轻微倾斜
    appearance_variants:
      - 纸箱颜色应为普通棕色瓦楞纸，带轻微折痕、污渍或压痕
      - 不要出现夸张品牌图案和过于干净的电商广告感
      - 阴影、透视和尺度要符合真实户外场景环境
  - category: 儿童活动物品
    target_key: soccer_ball
    target_variants:
      - 一个足球
      - 一个被遗落在草地上的儿童足球
      - 一个小型运动球
    placement_variants:
      - 画面中景草地边缘，靠近活动区域、空地或开阔位置
      - 中景偏左或偏右的草面、绿地或路边草丛上，部分被草叶遮挡
      - 靠近步道、围栏、休闲区或开放区域附近的草地表面
    state_variants:
      - 像家庭日常活动后随手留在草地上的物品，不要刻意居中
      - 可以轻微沾草屑、泥点或有使用痕迹
      - 体积要合理，不要显得像前景主体
    appearance_variants:
      - 颜色可辨识但不要异常鲜艳，表面应有真实磨损
      - 不要出现新品商品展示感或塑料感过强的高光
      - 应与地面有真实接触阴影，不能悬浮
  - category: 儿童活动物品
    target_key: toy_car
    target_variants:
      - 一辆小型玩具车
      - 一个儿童玩具车
      - 一辆遗落在院子里的小玩具车
    placement_variants:
      - 画面中景偏右的草地或空地表面，局部被草叶遮挡
      - 靠近道路边、人行小路或步道边缘的草面上
      - 草地中景靠近开放活动区或休闲区域的位置
    state_variants:
      - 应像儿童使用后随手遗落的状态，不要整齐摆放
      - 尺度较小，不要形成视觉主体
      - 可以轻微倾斜或半陷在草叶之间
    appearance_variants:
      - 表面可有轻微磨损、草屑或泥点，颜色低调可识别
      - 避免高饱和夸张玩具配色和强烈塑料反光
      - 细节不要比周围草地更锐利
  - category: 儿童活动物品
    target_key: frisbee
    target_variants:
      - 一个飞盘
      - 一个被放在草地上的儿童飞盘
      - 一个小型户外玩具飞盘
    placement_variants:
      - 画面中景偏左的草地表面，靠近开放活动区域
      - 靠近步道、空地边缘或草坪边的位置，局部被草压住
      - 画面中景偏右的草面或绿地上，部分边缘被草叶遮挡
    state_variants:
      - 状态应像户外日常活动后遗留，不要像刻意陈列的道具
      - 不要放在正中心，也不要完全无遮挡地孤立出现
      - 可以轻微倾斜或与草叶部分重叠
    appearance_variants:
      - 颜色可以略有识别度，但应控制在自然低饱和范围
      - 表面可有轻微磨痕、灰尘或草屑
      - 不能呈现新品广告图一样的干净边缘和均匀高光
  - category: 园艺用品与庭院工具
    target_key: garden_hose
    target_variants:
      - 一段园艺水管
      - 一截弯曲的浇水软管
      - 一段放在草地边缘的户外水管
    placement_variants:
      - 画面前中景草地表面，略微弯曲地穿过一小段草面
      - 靠近绿化边缘、灌木区域、路边设施或浇水区域的位置
      - 画面中景草地边缘、空地边或绿化带旁，部分被草叶遮挡
    state_variants:
      - 摆放应自然松弛，不要过分规整或笔直
      - 可局部压住草叶，也可局部被草遮挡
      - 不要像新商品陈列，应该像日常使用后的状态
    appearance_variants:
      - 材质反光应真实低调，可带轻微污渍、水痕或磨损
      - 颜色应为常见户外水管颜色，如深绿、灰绿、暗灰或暗色调
      - 透视和阴影必须与原图一致，不能悬空
  - category: 园艺用品与庭院工具
    target_key: garden_glove
    target_variants:
      - 一只园艺手套
      - 一副被拆散的户外工作手套中的一只
      - 一个遗落在草边的工作手套
    placement_variants:
      - 画面中景草地边缘，靠近花坛或灌木区域
      - 中景偏左或偏右的草面上，部分被草叶遮挡
      - 靠近工具包、水管或小桶附近的草地表面
    state_variants:
      - 手套应轻微折叠、扭曲或被草叶压住，不要平整摊开
      - 像现场使用过程中暂时遗落的状态
      - 不要居中摆放，也不要显得过于干净完整
    appearance_variants:
      - 表面可有轻微泥点、灰尘和使用痕迹，颜色自然低调
      - 避免夸张鲜艳的工业宣传风配色
      - 边缘不要过度锐利，必须与草地质感融合
  - category: 园艺用品与庭院工具
    target_key: flower_pot
    target_variants:
      - 一个小花盆
      - 一个带少量泥土痕迹的小型花盆
      - 一个暂时放在草边的户外花盆
    placement_variants:
      - 画面中景草地边缘，靠近花坛、小路或休闲区域旁
      - 靠近路面边缘与草地交界的位置
      - 画面中景偏左或偏右，位于绿化区域外侧草边
    state_variants:
      - 摆放应自然，底部与地面真实接触，可略有倾斜但不要夸张
      - 像临时放在户外场景中的园艺用品，不要像装饰摆拍
      - 不要成为构图主体，尺度保持偏小
    appearance_variants:
      - 花盆可带轻微泥土、水痕或磨损，材质可以是塑料、陶土或树脂
      - 颜色要自然低调，不要过亮过新
